<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sgagent · Agent Loop 查看器</title>
<style>
	:root {
		--bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #30363d;
		--text: #c9d1d9; --muted: #8b949e; --dim: #6e7681;
		--accent: #2dd4bf; --user: #1f6feb; --tool: #a371f7; --think: #d29922;
		--stop: #3fb950; --err: #f85149; --line: #30363d;
		}
	* { box-sizing: border-box; }
	html, body { height: 100%; margin: 0; }
	body {
		background: var(--bg); color: var(--text);
		font: 14px/1.55 -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
		display: flex; flex-direction: column;
		}
	code, .mono { font-family: "SF Mono", ui-monospace, "JetBrains Mono", Consolas, monospace; font-size: 12.5px; }
	header {
		padding: 11px 18px; border-bottom: 1px solid var(--border);
		display: flex; align-items: center; gap: 16px; flex-wrap: wrap; background: var(--panel);
		}
	header h1 { font-size: 15px; margin: 0; font-weight: 600; }
	header h1 .sub { color: var(--muted); font-weight: 400; margin-left: 6px; }
	.actions { display: flex; align-items: center; gap: 10px; }
	.btn { padding: 6px 12px; background: var(--accent); color: #04201c; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; border: none; }
	.btn:hover { filter: brightness(1.08); }
	#filter { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; width: 220px; }
	#summary { color: var(--muted); font-size: 12.5px; margin-left: auto; }
	#summary b { color: var(--text); }

	main { flex: 1; display: grid; grid-template-columns: 340px 1fr; min-height: 0; }
	aside { border-right: 1px solid var(--border); overflow-y: auto; background: var(--panel); }
	.turn {
		padding: 11px 14px; border-bottom: 1px solid #21262d; cursor: pointer;
		}
	.turn:hover { background: var(--panel2); }
	.turn.active { background: var(--panel2); border-left: 3px solid var(--accent); padding-left: 11px; }
	.turn .th { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
	.turn .tnum { font-family: ui-monospace, monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
	.turn .tmeta { font-size: 11px; color: var(--muted); margin-left: auto; }
	.turn .uinput { font-size: 12.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
	.turn .tstat { font-size: 11px; color: var(--dim); margin-top: 3px; }

	.badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10.5px; font-weight: 600; }
	.b-stop { background: rgba(63,185,80,.15); color: var(--stop); }
	.b-toolUse { background: rgba(31,111,235,.18); color: #79c0ff; }
	.b-length { background: rgba(210,153,34,.15); color: var(--think); }
	.b-error, .b-aborted { background: rgba(248,81,73,.15); color: var(--err); }

	#detail { overflow-y: auto; padding: 22px 30px 60px; max-width: 1100px; }
	.empty { color: var(--muted); text-align: center; margin-top: 40vh; }

	/* loop header */
	.loophead { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
	.loophead .ln { font-size: 18px; font-weight: 700; }
	.loophead .lmeta { color: var(--muted); font-size: 12.5px; }
	.usage-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 22px; }
	.stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 7px 13px; min-width: 88px; }
	.stat .n { font-size: 16px; font-weight: 600; font-family: ui-monospace, monospace; }
	.stat .l { font-size: 10.5px; color: var(--muted); }
	.stat.in .n { color: #79c0ff; } .stat.cache .n { color: var(--think); } .stat.out .n { color: var(--accent); }

	/* user input bubble */
	.user-card {
		background: rgba(31,111,235,.10); border: 1px solid rgba(31,111,235,.4); border-radius: 12px;
		padding: 12px 16px; margin: 10px 0 22px; position: relative;
		}
	.user-card .lbl { font-size: 11px; color: #79c0ff; font-weight: 600; margin-bottom: 4px; }
	.user-card .body { white-space: pre-wrap; word-break: break-word; }

	/* timeline */
	.timeline { position: relative; padding-left: 26px; }
	.timeline::before { content: ""; position: absolute; left: 9px; top: 6px; bottom: 6px; width: 2px; background: var(--line); }
	.step { position: relative; margin-bottom: 20px; }
	.step::before {
		content: ""; position: absolute; left: -22px; top: 4px; width: 14px; height: 14px; border-radius: 50%;
		background: var(--panel); border: 3px solid var(--dim);
		}
	.step.toolUse::before { border-color: var(--tool); }
	.step.stop::before { border-color: var(--stop); }
	.step.error::before, .step.aborted::before { border-color: var(--err); }

	.stephead { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
	.stephead .sn { font-size: 12px; color: var(--muted); font-family: ui-monospace, monospace; }
	.stephead .file { font-size: 10.5px; color: var(--dim); font-family: ui-monospace, monospace; }
	.stephead .tok { font-size: 11px; color: var(--dim); margin-left: auto; font-family: ui-monospace, monospace; }

	.block { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--panel); margin: 6px 0; }
	.block .bh { display: flex; align-items: center; gap: 6px; padding: 5px 11px; font-size: 11.5px; font-weight: 600; background: var(--panel2); }
	.block .bh .ico { width: 14px; text-align: center; }
	.block .bb { padding: 9px 13px; white-space: pre-wrap; word-break: break-word; }
	.bh.think { color: var(--think); } .block.think { border-color: rgba(210,153,34,.35); }
	.bh.act { color: var(--text); }
	.bh.tool { color: var(--tool); } .block.tool { border-color: rgba(163,113,247,.35); }
	.bh.res { color: var(--muted); }
	.bh.final { color: var(--stop); } .block.final { border-color: rgba(63,185,80,.4); background: rgba(63,185,80,.05); }
	.block .bb.mono { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); }
	/* 超过 10 行的内容折叠，点击展开 */
	.block.long > .bb {
		display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;
		-webkit-line-clamp: 10; line-clamp: 10;
		}
	.block.long.open > .bb { display: block; -webkit-line-clamp: unset; line-clamp: unset; }
	.clamp-btn {
		display: block; width: 100%; padding: 6px; text-align: center;
		background: var(--panel2); border: none; border-top: 1px solid var(--border);
		color: var(--accent); cursor: pointer; font-size: 11.5px; font-family: inherit;
		}
	.clamp-btn:hover { background: #262c36; }

	/* formatted request/response messages: new vs history */
	.block.msg.new { border-color: rgba(31,111,235,.5); background: rgba(31,111,235,.05); }
	.block.msg.cache { border-color: rgba(210,153,34,.3); background: rgba(210,153,34,.04); opacity: .88; }
	.bh .rl { font-weight: 600; }
	.bh .rl.r-dev { color: var(--dim); }
	.bh .rl.r-user { color: #79c0ff; }
	.bh .rl.r-asst { color: var(--accent); }
	.bh .rl.r-tool { color: var(--tool); }
	.bh .rl.r-think { color: var(--think); }
	.bh .nh { margin-left: auto; font-size: 10px; padding: 1px 7px; border-radius: 9px; font-weight: 600; }
	.nh-new { background: rgba(31,111,235,.22); color: #79c0ff; }
	.nh-cache { background: rgba(210,153,34,.18); color: var(--think); }
	/* usage token colors */
	.tok-new { color: #79c0ff; font-weight: 600; }
	.tok-cache { color: var(--think); font-weight: 600; }
	.tok-out { color: var(--accent); font-weight: 600; }
	.usage-line { font-size: 12px; font-family: ui-monospace, monospace; }
	/* detail section with raw/formatted toggle */
	.reqdet { margin-top: 10px; }
	.reqdet > summary { font-size: 12px; color: var(--accent); font-weight: 600; }
	.rdhead { display: flex; align-items: center; gap: 10px; margin: 8px 0; flex-wrap: wrap; }
	.view-tabs { margin-left: auto; display: inline-flex; gap: 2px; background: var(--panel2); border-radius: 6px; padding: 2px; }
	.view-tab { padding: 3px 11px; font-size: 11px; border-radius: 4px; cursor: pointer; color: var(--muted); border: none; background: none; font-family: inherit; }
	.view-tab.active { background: var(--bg); color: var(--text); }
	.rdsec { margin: 8px 0; }
	.rds-l { font-size: 10.5px; color: var(--dim); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: .5px; }
	.rdmeta { font-size: 11px; color: var(--dim); margin-top: 8px; font-family: ui-monospace, monospace; }

	details { margin: 6px 0; }
	details > summary { cursor: pointer; color: var(--dim); font-size: 11.5px; user-select: none; padding: 2px 0; }
	/* per-day group header in the sidebar */
	.day { margin: 0; padding: 0; }
	.day > summary { list-style: none; display: flex; align-items: center; gap: 8px; padding: 9px 14px; font-size: 12.5px; color: var(--text); font-weight: 600; background: var(--panel2); position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--border); }
	.day > summary::-webkit-details-marker { display: none; }
	.day > summary::before { content: "▸"; color: var(--muted); font-size: 10px; }
	.day[open] > summary::before { content: "▾"; }
	.day > summary .cnt { margin-left: auto; color: var(--muted); font-weight: 400; font-size: 11px; font-family: ui-monospace, monospace; }
	details > summary:hover { color: var(--text); }
	pre.json { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; margin: 6px 0; font-size: 11.5px; }

	.toolcall { font-family: ui-monospace, monospace; }
	.toolcall .tn { color: var(--tool); font-weight: 600; }
	.args { color: var(--muted); }
	.drop { outline: 2px dashed var(--accent) !important; outline-offset: -8px; }
	::-webkit-scrollbar { width: 10px; height: 10px; }
	::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
</style>
</head>
<body>
<header>
	<h1>Agent Loop 查看器 <span class="sub">sgagent trace</span></h1>
	<div class="actions">
		<label class="btn">选择 data 文件夹<input type="file" id="picker" webkitdirectory multiple hidden></label>
		<button class="btn" id="reload" hidden>↻ 刷新</button>
		<input type="search" id="filter" placeholder="过滤（用户输入/工具名/文本）">
	</div>
	<div id="summary"></div>
</header>
<main>
	<aside id="list"><div class="empty">点上方按钮选择 <code>data</code> 文件夹</div></aside>
	<section id="detail"><div class="empty">选择 <code>data</code> 文件夹后，这里展示每个 agent loop 的完整流程</div></section>
</main>

<script>
let CALLS = [];
let TURNS = [];
let activeTurn = -1;
let openDays = new Set();

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const fmtT = (n) => { n = +n || 0; return n >= 1000 ? (n/1000).toFixed(n >= 10000 ? 0 : 1) + "k" : String(n); };
// Cache hit rate = cached-read tokens ÷ total input (cacheRead + new input).
// Exact: both values come straight from the API usage object.
const hitRate = (cacheRead, input) => { const t = (+cacheRead||0)+(+input||0); return t>0 ? Math.round((+cacheRead||0)/t*100) : 0; };
const pad = (n, w = 2) => String(n).padStart(w, "0");
// Sidebar groups turns by day. The first 8 chars of a trace filename are YYYYMMDD
// (loop id and the legacy per-call stamp share this prefix); fall back to the ts.
function dayKey(t) {
	const f = (t.steps[0]?._file || "").slice(0, 8);
	if (/^\d{8}$/.test(f)) return f;
	const d = new Date(t.ts || 0);
	return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}`;
}
function fmtDay(s) {
	const y = +s.slice(0, 4), m = +s.slice(4, 6) - 1, d = +s.slice(6, 8);
	const w = "日一二三四五六"[new Date(y, m, d).getDay()];
	return `${y}-${pad(m + 1)}-${pad(d)} 周${w}`;
}
const clock = (ts) => { const d = new Date(ts); return d.toLocaleTimeString("zh-CN", { hour12: false }); };

function contentToText(content) {
	if (typeof content === "string") return content;
	if (Array.isArray(content)) return content.filter(p => p.type === "text").map(p => p.text).join("\n");
	return JSON.stringify(content);
}
function lastUserText(call) {
	const msgs = call.request?.messages || [];
	for (let i = msgs.length - 1; i >= 0; i--) if (msgs[i].role === "user") return contentToText(msgs[i].content);
	return "(无用户输入)";
}
// Each trace file is stamped at write time with a loopId (set by beginLoop()
// right before agent.prompt() — one id per user prompt = per agent loop). That
// id is the authoritative grouping key: every call of a loop shares it.
// For legacy traces written before loop ids existed, fall back to a derived
// user-prompt count (the agent appends exactly one role:user msg per prompt and
// never trims history, so the count is stable within a loop, +1 per prompt).
// Synthetic "Attached image(s)" user msgs are skipped in the count.
function userPromptCount(messages) {
	let n = 0;
	for (const m of messages || []) {
		if (m.role !== "user") continue;
		if (contentToText(m.content) === "Attached image(s) from tool result:") continue;
		n += 1;
	}
	return n;
}
function loopKey(c) {
	return c.loopId ? "loop:" + c.loopId : "auto:" + userPromptCount(c.request?.messages);
}
// Group calls into turns (loops) by loopId (or the derived fallback key).
function buildTurns(events) {
	const turns = [];
	let cur = null;
	for (const e of events) {
		const key = loopKey(e);
		if (!cur || cur.key !== key) {
			cur = { idx: turns.length, key, loopId: e.loopId || "", steps: [], modelCalls: [] };
			turns.push(cur);
		}
		cur.steps.push(e);
		if (e.kind === "model") cur.modelCalls.push(e);
	}
	// Prefix boundary per model call (structural split: sent-before vs newly-added).
	let prevCount = 0;
	for (const t of turns) {
		t.steps.sort((a, b) => (a.ts || 0) - (b.ts || 0));
		for (const c of t.modelCalls) {
			const msgs = c.request?.messages || [];
			if (msgs.length < prevCount) prevCount = 0; // new session
			const cacheRead = c.response.usage?.cacheRead || 0;
			let base;
			if (cacheRead === 0) base = 0;
			else if (prevCount === 0) {
				base = 0;
				while (base < msgs.length && (msgs[base].role === "system" || msgs[base].role === "developer")) base++;
			} else base = Math.min(prevCount, msgs.length);
			c._baseCount = base;
			prevCount = msgs.length;
		}
		const first = t.modelCalls[0];
		const last = t.modelCalls[t.modelCalls.length - 1];
		t.userInput = first ? (first.input || lastUserText(first)) : (t.steps[0]?.toolName ? `🔧 ${t.steps[0].toolName}` : "");
		t.tokens = t.modelCalls.reduce((s, c) => s + (c.response.usage?.totalTokens || 0), 0);
		t.finalStop = last ? last.response.stopReason : "stop";
		t.ts = t.steps[0]?.ts || 0;
	}
	return turns;
}

function badge(stop) {
	const map = { stop: "完成", toolUse: "调用工具", length: "长度截断", error: "错误", aborted: "中断" };
	return `<span class="badge b-${stop}">${map[stop] || stop}</span>`;
}

function renderSidebar(filter) {
	const f = filter.trim().toLowerCase();
	const filtering = !!f;
	// Remember which days the user expanded before we rebuild the list.
	if (!filtering) openDays = new Set([...document.querySelectorAll('#list details[data-day][open]')].map((d) => d.dataset.day));
	let turns = TURNS;
	if (f) turns = TURNS.filter((t) => (t.userInput + JSON.stringify(t.steps)).toLowerCase().includes(f));
	const groups = new Map();
	for (const t of turns) { const k = dayKey(t); if (!groups.has(k)) groups.set(k, []); groups.get(k).push(t); }
	const days = [...groups.keys()].sort().reverse();
	const list = $("#list");
	if (!days.length) { list.innerHTML = `<div class="empty">${TURNS.length ? "无匹配" : "（无数据）"}</div>`; return; }
	if (!filtering && openDays.size === 0) openDays.add(days[0]); // newest day open by default
	list.innerHTML = days.map((day) => {
		const ts = groups.get(day);
		const tok = ts.reduce((s, t) => s + (t.tokens || 0), 0);
		const items = ts.map((t) => `
			<div class="turn ${t.idx === activeTurn ? "active" : ""}" data-i="${t.idx}">
				<div class="th">
					<span class="tnum">Loop #${t.idx + 1}</span>
					${badge(t.finalStop)}
					<span class="tmeta">${clock(t.ts)}</span>
				</div>
				<div class="uinput">${esc(t.userInput)}</div>
				<div class="tstat">${t.steps.length} 步 · ${fmtT(t.tokens)} token</div>
			</div>`).join("");
		const open = (filtering || openDays.has(day)) ? " open" : "";
		return `<details class="day" data-day="${day}"${open}><summary><span>📅 ${fmtDay(day)}</span><span class="cnt">${ts.length} loop · ${fmtT(tok)} token</span></summary>${items}</details>`;
	}).join("");
}

function block(ico, type, label, text, opts) {
	opts = opts || {};
	const t = String(text ?? "");
	const lines = t.split("\n").length;
	const long = lines > 10;
	const btn = long ? `<button class="clamp-btn" onclick="toggleClamp(this)">展开 (${lines} 行) ▾</button>` : "";
	return `<div class="block ${type}${long ? " long" : ""}"${long ? ` data-lines="${lines}"` : ""}><div class="bh ${type}"><span class="ico">${ico}</span>${label}</div><div class="bb${opts.mono ? " mono" : ""}">${esc(t)}</div>${btn}</div>`;
}
function toggleClamp(btn) {
	const b = btn.closest(".block");
	b.classList.toggle("open");
	btn.textContent = b.classList.contains("open") ? "收起 ▴" : `展开 (${b.dataset.lines} 行) ▾`;
}

// --- formatted request/response detail (new vs history · raw toggle) ---
const ROLE = {
	developer: ["系统", "r-dev"], system: ["系统", "r-dev"],
	user: ["用户", "r-user"], assistant: ["助手", "r-asst"], tool: ["工具结果", "r-tool"],
};
function clampWrap(cls, head, text, mono) {
	const t = String(text ?? "");
	const lines = t.split("\n").length;
	const long = lines > 10;
	const btn = long ? `<button class="clamp-btn" onclick="toggleClamp(this)">展开 (${lines} 行) ▾</button>` : "";
	return `<div class="block ${cls}${long ? " long" : ""}"${long ? ` data-lines="${lines}"` : ""}><div class="bh ${cls}">${head}</div><div class="bb${mono ? " mono" : ""}">${esc(t)}</div>${btn}</div>`;
}
function msgText(m) {
	if (m.role === "assistant") {
		const parts = [];
		const txt = typeof m.content === "string" ? m.content : (Array.isArray(m.content) ? m.content.filter((p) => p.type === "text").map((p) => p.text).join("") : "");
		if ((txt || "").trim()) parts.push(txt);
		if (Array.isArray(m.tool_calls)) for (const tc of m.tool_calls) parts.push(`🔧 ${tc.function?.name || ""}(${tc.function?.arguments || ""})`);
		return parts.join("\n");
	}
	return contentToText(m.content);
}
function renderMsg(m, i, baseCount) {
	const [label, rcls] = ROLE[m.role] || [m.role, "r-dev"];
	const isCached = i < baseCount;
	const nh = isCached ? `<span class="nh nh-cache">前缀</span>` : `<span class="nh nh-new">新增</span>`;
	const head = `<span class="rl ${rcls}">${label} · #${i}</span>${nh}`;
	return clampWrap(`msg ${isCached ? "cache" : "new"}`, head, msgText(m), m.role === "tool");
}
function renderResponseDetail(r) {
	const out = [];
	for (const b of r.content || []) {
		if (b.type === "thinking") out.push(clampWrap("think", `<span class="rl r-think">思考 · reasoning</span>`, b.thinking || ""));
		else if (b.type === "text") out.push(clampWrap("final", `<span class="rl r-asst">文本 · output</span>`, b.text || ""));
		else if (b.type === "toolCall") out.push(clampWrap("tool", `<span class="rl r-tool">工具调用</span>`, `🔧 ${b.name}(${JSON.stringify(b.arguments)})`));
	}
	return out.join("") + `<div class="rdmeta">stop: ${esc(r.stopReason || "")} · model: ${esc(r.model || "")}${r.responseId ? " · id: " + esc(r.responseId) : ""}</div>`;
}
function renderDetail(c) {
	const u = c.response.usage || {};
	const inNew = u.input || 0, cache = u.cacheRead || 0, out = u.output || 0;
	const hr = hitRate(cache, inNew);
	const usage = `<div class="usage-line">输入 <span class="tok-new">新增 ${fmtT(inNew)}</span> + <span class="tok-cache">缓存 ${fmtT(cache)}</span> = ${fmtT(inNew + cache)} · <span class="tok-out">输出 ${fmtT(out)}</span> · <span class="tok-cache">命中 ${hr}%</span>${u.reasoning ? ` · 思考 ${fmtT(u.reasoning)}` : ""}</div>`;
	const baseCount = c._baseCount ?? 0;
	const total = (c.request?.messages || []).length;
	const msgs = (c.request?.messages || []).map((m, i) => renderMsg(m, i, baseCount)).join("");
	const resp = renderResponseDetail(c.response);
	const raw = esc(JSON.stringify({ request: c.request, response: c.response }, null, 2));
	return `<details class="reqdet"><summary>请求 / 响应详情（前缀 ${baseCount} · 新增 ${total - baseCount}）</summary>
		<div class="rdhead"><span class="rdlabel">${usage}</span><div class="view-tabs"><button class="view-tab active" onclick="setDetailView(this,'fmt')">格式化</button><button class="view-tab" onclick="setDetailView(this,'raw')">显示原文</button></div></div>
		<div class="rd-fmt"><div class="rdsec"><div class="rds-l">请求</div>${msgs}</div><div class="rdsec"><div class="rds-l">响应</div>${resp}</div></div>
		<div class="rd-raw" style="display:none"><pre class="json">${raw}</pre></div>
	</details>`;
}
function setDetailView(btn, mode) {
	const det = btn.closest(".reqdet");
	if (!det) return;
	det.querySelectorAll(".view-tab").forEach((b) => b.classList.remove("active"));
	btn.classList.add("active");
	const fmt = det.querySelector(".rd-fmt"), raw = det.querySelector(".rd-raw");
	if (fmt) fmt.style.display = mode === "fmt" ? "" : "none";
	if (raw) raw.style.display = mode === "raw" ? "" : "none";
}

// --- tool execution helpers ---
function toolResultText(result) {
	if (!result) return "(无结果)";
	const c = result.content;
	if (Array.isArray(c)) return c.filter((p) => p.type === "text").map((p) => p.text || "").join("\n") || "(无文本结果)";
	if (typeof c === "string") return c;
	return JSON.stringify(result, null, 2);
}
// bash-style tools swallow errors: isError=false but details.exitCode≠0.
function isToolError(result) {
	const exit = result?.details?.exitCode;
	return typeof exit === "number" && exit !== 0;
}

// One LLM call — split into explicit 输入 (new messages this call added) and
// 输出 (what the model produced: thinking / text / toolCall decision). Tool
// *results* live in their own step (renderToolStep), not here.
function renderModelStep(c, k, total) {
	const u = c.response.usage || {};
	const stop = c.response.stopReason;
	const cont = c.response.content || [];
	const thinking = cont.find((b) => b.type === "thinking");
	const text = cont.find((b) => b.type === "text");
	const toolCalls = cont.filter((b) => b.type === "toolCall");
	const msgs = c.request?.messages || [];
	const base = c._baseCount ?? 0;
	const newMsgs = msgs.slice(base);
	const inputBlocks = newMsgs.map((m, idx) => renderMsg(m, base + idx, base)).join("");

	const outParts = [];
	if (thinking) outParts.push(block("🤔", "think", "思考", thinking.thinking));
	if (text && (text.text || "").trim()) outParts.push(block("📝", "final", "文本回复", text.text));
	for (const tc of toolCalls) {
		outParts.push(`<div class="block tool"><div class="bh tool"><span class="ico">🔧</span>决定调用工具 · <span class="tn">${esc(tc.name)}</span></div><div class="bb toolcall"><span class="tn">${esc(tc.name)}</span>(<span class="args">${esc(JSON.stringify(tc.arguments))}</span>)</div></div>`);
	}
	if (c.response.errorMessage) outParts.push(`<div class="block"><div class="bh res" style="color:var(--err)"><span class="ico">⚠</span>错误</div><div class="bb" style="color:var(--err)">${esc(c.response.errorMessage)}</div></div>`);

	// Badge describes THIS call's output (not the stop reason), so it never reads
	// like a tool-execution step.
	let outBadge;
	if (c.response.errorMessage) outBadge = `<span class="badge b-error">出错</span>`;
	else if (toolCalls.length) outBadge = `<span class="badge b-toolUse">输出 · 将调用 ${esc(toolCalls.map((tc) => tc.name).join(", "))}</span>`;
	else outBadge = `<span class="badge b-stop">输出 · 文本回复</span>`;

	return `<div class="step ${stop}">
		<div class="stephead"><span class="sn">步骤 ${k + 1}/${total} · 💬 LLM 调用</span>${outBadge}<span class="tok"><span class="tok-new">新增 ${fmtT(u.input)}</span> + <span class="tok-cache">缓存 ${fmtT(u.cacheRead)}</span> · <span class="tok-out">出 ${fmtT(u.output)}</span> · 命中 ${hitRate(u.cacheRead, u.input)}%</span></div>
		<div class="rdsec"><div class="rds-l">📥 输入（新增 ${newMsgs.length} 条）</div>${inputBlocks || '<div class="rdmeta">（全部为前缀，无新增）</div>'}</div>
		<div class="rdsec"><div class="rds-l">📤 输出</div>${outParts.join("") || '<div class="rdmeta">（无输出）</div>'}</div>
		${renderDetail(c)}
	</div>`;
}

// One tool execution — name, args, result, duration. A real agent step.
function renderToolStep(e, k, total) {
	const ok = !e.isError && !isToolError(e.result);
	const argsText = JSON.stringify(e.args ?? {});
	const resultText = toolResultText(e.result);
	const parts = [
		`<div class="block tool"><div class="bh tool"><span class="ico">▸</span>参数</div><div class="bb toolcall mono">${esc(argsText)}</div></div>`,
		block("↳", "res", `结果 · ${resultText.length} 字符`, resultText, { mono: true }),
	];
	if (!ok) parts.push(`<div class="block"><div class="bh res" style="color:var(--err)"><span class="ico">⚠</span>执行出错</div><div class="bb" style="color:var(--err)">${esc(resultText.slice(0, 500))}</div></div>`);
	return `<div class="step ${ok ? "stop" : "error"} toolstep">
		<div class="stephead"><span class="sn">步骤 ${k + 1}/${total} · 🔧 ${esc(e.toolName)}</span><span class="badge ${ok ? "b-stop" : "b-error"}">${ok ? "✓ 完成" : "✗ 出错"}</span><span class="tok">${e.durationMs || 0} ms</span></div>
		${parts.join("")}
	</div>`;
}

function renderTurn(t) {
	const u = { input: 0, output: 0, cacheRead: 0, reasoning: 0, total: 0 };
	for (const c of t.modelCalls) { const x = c.response.usage || {}; u.input += x.input||0; u.output += x.output||0; u.cacheRead += x.cacheRead||0; u.reasoning += x.reasoning||0; u.total += x.totalTokens||0; }
	const realIn = u.input + u.cacheRead;
	const toolCount = t.steps.filter((s) => s.kind === "tool").length;
	const total = t.steps.length;
	const stepsHtml = t.steps.map((s, k) => (s.kind === "tool" ? renderToolStep(s, k, total) : renderModelStep(s, k, total))).join("");
	return `
		<div class="loophead">
			<span class="ln">Loop #${t.idx + 1}</span>
			<span class="lmeta">${t.modelCalls.length} 次 LLM 调用 · ${toolCount} 次工具执行 · ${clock(t.ts)} · 模型 ${esc(t.modelCalls[0]?.response.model || "")} · loop ${esc(t.loopId || t.key)}</span>
			${badge(t.finalStop)}
		</div>
		<div class="usage-row">
			<div class="stat in"><div class="n">${fmtT(realIn)}</div><div class="l">实际输入</div></div>
			<div class="stat cache"><div class="n">${fmtT(u.cacheRead)}</div><div class="l">缓存命中 ${hitRate(u.cacheRead, u.input)}%</div></div>
			<div class="stat out"><div class="n">${fmtT(u.output)}</div><div class="l">输出</div></div>
			<div class="stat"><div class="n">${fmtT(u.reasoning)}</div><div class="l">思考</div></div>
			<div class="stat"><div class="n">${fmtT(u.total)}</div><div class="l">合计</div></div>
		</div>

		<div class="user-card">
			<div class="lbl">👤 用户输入</div>
			<div class="body">${esc(t.userInput)}</div>
		</div>

		<div class="timeline">
			${stepsHtml}
		</div>
	`;
}

function selectTurn(i) {
	activeTurn = i;
	const t = TURNS.find((x) => x.idx === i);
	if (t) $("#detail").innerHTML = renderTurn(t);
	renderSidebar($("#filter").value);
}

// Parse {name, text} pairs (one .json = one call; one .jsonl = many calls on
// separate lines) into CALLS/TURNS, then render. Shared by folder pick, drag,
// and the auto-load from the local server.
function ingest(pairs) {
	const events = [];
	for (const { name, text } of pairs) {
		const isJsonl = name.endsWith(".jsonl");
		try {
			const rows = isJsonl ? text.split("\n").filter((l) => l.trim()) : [text];
			for (const r of rows) {
				const obj = JSON.parse(r);
				if (!obj) continue;
				if (obj.type === "tool" || (obj.toolName && !obj.request)) {
					events.push({ kind: "tool", ts: obj.timestamp || 0, loopId: obj.loopId || "", toolCallId: obj.toolCallId, toolName: obj.toolName, args: obj.args, result: obj.result, isError: obj.isError, durationMs: obj.durationMs, _file: name });
				} else if (obj.request && obj.response) {
					events.push({ ...obj, kind: "model", ts: obj.timestamp || 0, _file: name });
				}
			}
		}
		catch { /* skip */ }
	}
	events.sort((a, b) => (a.ts || 0) - (b.ts || 0));
	CALLS = events;
	TURNS = buildTurns(events);
	const tok = TURNS.reduce((s, t) => s + t.tokens, 0);
	const mc = events.filter((e) => e.kind === "model").length;
	const tc = events.filter((e) => e.kind === "tool").length;
	$("#summary").innerHTML = TURNS.length ? `<b>${TURNS.length}</b> 个 loop · <b>${mc}</b> 次 LLM 调用 · <b>${tc}</b> 次工具执行 · 共 <b>${fmtT(tok)}</b> token` : "";
	openDays = new Set();
	renderSidebar("");
	if (TURNS.length) selectTurn(TURNS[0].idx);
}

async function loadFiles(files) {
	const pairs = [];
	for (const f of files) {
		const isJsonl = f.name.endsWith(".jsonl");
		if (!isJsonl && !f.name.endsWith(".json")) continue;
		pairs.push({ name: f.name, text: await f.text() });
	}
	ingest(pairs);
}

async function loadFromServer() {
	const list = $("#list");
	list.innerHTML = `<div class="empty">加载中…</div>`;
	try {
		const res = await fetch("/api/traces");
		if (!res.ok) throw new Error("HTTP " + res.status);
		ingest(await res.json());
	} catch (e) {
		list.innerHTML = `<div class="empty">加载失败：${esc(e.message)}<br>请确认本地服务在运行（npm run view）</div>`;
	}
}

$("#picker").addEventListener("change", (e) => loadFiles([...e.target.files]));
$("#filter").addEventListener("input", (e) => renderSidebar(e.target.value));
$("#list").addEventListener("click", (e) => { const el = e.target.closest(".turn"); if (el) selectTurn(+el.dataset.i); });
$("#reload").addEventListener("click", () => { if (location.protocol.startsWith("http")) loadFromServer(); });
// Auto-load when served by `npm run view` (browsers can't read local paths directly).
if (location.protocol.startsWith("http")) { $("#reload").hidden = false; loadFromServer(); }

let dragCnt = 0;
window.addEventListener("dragover", (e) => e.preventDefault());
window.addEventListener("dragenter", () => { dragCnt++; document.body.classList.add("drop"); });
window.addEventListener("dragleave", () => { if (--dragCnt <= 0) document.body.classList.remove("drop"); });
window.addEventListener("drop", async (e) => {
	e.preventDefault(); dragCnt = 0; document.body.classList.remove("drop");
	const items = e.dataTransfer.items; const files = [];
	const wrap = (f, name) => Object.defineProperty(f, "name", { value: name });
	if (items && items.length && items[0].webkitGetAsEntry) {
		const traverse = async (entry) => {
			if (entry.isFile) await new Promise((r) => entry.file((f) => { files.push({ name: entry.name, text: () => f.text() }); r(); }));
			else if (entry.isDirectory) { const reader = entry.createReader(); await new Promise((r) => { const all = []; (function rd() { reader.readEntries(async (es) => { if (!es.length) { await Promise.all(all.map(traverse)); r(); } else { all.push(...es); rd(); } }); })(); }); }
		};
		const entries = []; for (const it of items) { const en = it.webkitGetAsEntry && it.webkitGetAsEntry(); if (en) entries.push(en); }
		await Promise.all(entries.map(traverse));
	} else { for (const f of e.dataTransfer.files) files.push({ name: f.name, text: () => f.text() }); }
	if (files.length) loadFiles(files);
});
</script>
